name = "mool-gyan-app"
compatibility_date = "2026-04-16"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"
cwd = "."
watch_dir = "src"

[env.production]
vars = { NODE_ENV = "production" }

# Static assets configuration
[assets]
directory = "./dist"

# Prevent OpenNext auto-installation
pages_build_output_dir = "dist"
